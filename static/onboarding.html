<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MedPass — Finaliser mon compte</title><link rel="stylesheet" href="/styles.css" /></head>
<body data-page="onboarding"><div class="app-bg"></div><main class="shell shell-site shell-full"><section class="phone-frame wide-frame site-frame site-frame-full"><header class="topbar topbar-site"><div><p class="eyebrow">Première connexion</p><h1>Finaliser mon compte</h1><p class="muted site-subtitle">Confirmez votre e-mail et choisissez votre mot de passe définitif.</p></div></header><nav id="global-nav" class="app-nav"></nav><section class="section-block"><div class="app-card"><p class="muted">Adresse e-mail du compte</p><strong id="onboarding-email"></strong></div><form id="onboarding-form" class="stack" style="margin-top:14px;"><input type="hidden" id="onboarding-email-input" /><div class="grid-2"><div class="label-block"><label>Code e-mail</label><input name="verification_code" required /></div><div class="label-block"><label>Numéro de téléphone</label><input name="phone_number" required /></div></div><div class="label-block"><label>Nouveau mot de passe</label><input type="password" name="new_password" minlength="8" required /></div><div class="form-actions"><button type="button" id="send-onboarding-code" class="btn btn-secondary">Envoyer le code</button><button type="submit" class="btn btn-primary">Finaliser mon compte</button></div></form><div id="onboarding-result"></div></section></section></main><script src="/app.js"></script></body></html>
