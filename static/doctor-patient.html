<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MedPass — Dossier patient</title><link rel="stylesheet" href="/styles.css" /></head>
<body data-page="doctorPatient"><div class="app-bg"></div><main class="shell"><section class="phone-frame wide-frame"><header class="topbar app-header-rich"><div><p class="eyebrow">Dossier complet médecin</p><h1 id="patient-title">Patient</h1><p class="muted" id="patient-subtitle"></p></div><button id="logout-btn" class="btn btn-secondary">Déconnexion</button></header><nav id="global-nav" class="app-nav"></nav><div id="doctor-patient-message"></div><section class="split-grid"><div class="section-block"><div class="section-title-row"><div><p class="section-kicker">Vue rapide</p><h3>Données critiques</h3></div><button id="archive-patient" class="btn btn-danger">Archiver</button></div><div class="stack"><div class="data-box"><h4>Groupe sanguin</h4><p id="dp-blood">—</p></div><div class="data-box"><h4>Contact urgence</h4><p id="dp-contact">—</p></div><div class="data-box"><h4>Allergies</h4><div id="dp-allergies" class="array-list"></div></div><div class="data-box"><h4>Pathologies urgence</h4><div id="dp-conditions" class="array-list"></div></div><div class="data-box"><h4>Notes privées</h4><p id="dp-notes">—</p></div><a id="doctor-open-public" class="btn btn-secondary" href="/doctor-rescue.html">Vue secours</a></div></div><form id="doctor-patient-update-form" class="section-block stack"><div class="section-title-row"><div><p class="section-kicker">Modification</p><h3>Mettre à jour le dossier</h3></div></div><div class="grid-2"><div class="label-block"><label>Groupe sanguin</label><input name="blood_type" /></div><div class="label-block"><label>Contact urgence</label><input name="emergency_contact_name" /></div></div><div class="grid-2"><div class="label-block"><label>Numéro urgence</label><input name="emergency_contact_phone" /></div><div class="label-block"><label>Instructions</label><textarea name="emergency_instructions"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Allergies</label><textarea name="public_allergies"></textarea></div><div class="label-block"><label>Pathologies urgence</label><textarea name="public_conditions"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Médecin traitant</label><input name="doctor_name" /></div><div class="label-block"><label>RPPS</label><input name="doctor_rpps" /></div></div><div class="label-block"><label>Notes</label><textarea name="notes"></textarea></div><div class="section-title-row"><div><p class="section-kicker">Cas ouverts</p><h3>Ajouter un cas libre</h3></div></div><div class="grid-2"><div class="label-block"><label>Titre du cas</label><input id="case_title" /></div><div class="label-block"><label>Contenu</label><textarea id="case_content"></textarea></div></div><button type="button" id="add-case-btn" class="btn btn-secondary">Ajouter le cas</button><div id="doctor-cases-list" class="stack"></div><button class="btn btn-primary" type="submit">Enregistrer</button></form></section></section></main><script src="/app.js"></script></body></html>
