<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedPass — Nouveau patient</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="doctorForm">
  <div class="app-bg"></div>
  <main class="shell">
<section class="phone-frame wide-frame"><header class="topbar"><div><p class="eyebrow">Médecin</p><h1>Créer un patient</h1></div><div class="toolbar"><a href="/doctor.html" class="btn btn-secondary">Dashboard</a><button id="logout-btn" class="btn btn-secondary">Déconnexion</button></div></header><form id="doctor-create-patient-form" class="section-block stack"><div class="section-title-row"><div><p class="section-kicker">Identité</p><h3>Compte patient</h3></div><a href="/doctor-pin.html" class="btn btn-secondary">Vérifier mon PIN</a></div><div class="grid-2"><div class="label-block"><label>Prénom</label><input name="first_name" required /></div><div class="label-block"><label>Nom</label><input name="last_name" required /></div></div><div class="grid-3"><div class="label-block"><label>E-mail</label><input type="email" name="email" required /></div><div class="label-block"><label>Mot de passe temporaire</label><input name="password" minlength="8" required /></div><div class="label-block"><label>Date de naissance</label><input type="date" name="birth_date" /></div></div><div class="section-title-row"><div><p class="section-kicker">Urgence</p><h3>Données publiques</h3></div></div><div class="grid-2"><div class="label-block"><label>Groupe sanguin</label><input name="blood_type" /></div><div class="label-block"><label>Nom contact urgence</label><input name="emergency_contact_name" /></div></div><div class="grid-2"><div class="label-block"><label>Téléphone urgence</label><input name="emergency_contact_phone" /></div><div class="label-block"><label>Instructions secours</label><textarea name="emergency_instructions"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Allergies</label><textarea name="public_allergies"></textarea></div><div class="label-block"><label>Pathologies d'urgence</label><textarea name="public_conditions"></textarea></div></div><div class="section-title-row"><div><p class="section-kicker">Médical privé</p><h3>Données chiffrées</h3></div></div><div class="grid-2"><div class="label-block"><label>Médecin traitant</label><input name="doctor_name" /></div><div class="label-block"><label>RPPS</label><input name="doctor_rpps" /></div></div><div class="grid-2"><div class="label-block"><label>Traitements</label><textarea name="treatments"></textarea></div><div class="label-block"><label>Antécédents</label><textarea name="antecedents"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Vaccinations</label><textarea name="vaccinations"></textarea></div><div class="label-block"><label>Ordonnances</label><textarea name="ordonnances"></textarea></div></div><div class="grid-3"><div class="label-block"><label>IMC</label><input name="imc" /></div><div class="label-block"><label>Tension</label><input name="blood_pressure" /></div><div class="label-block"><label>Notes</label><textarea name="notes"></textarea></div></div><div class="form-actions"><button type="submit" class="btn btn-primary">Créer le patient</button><a href="/doctor.html" class="btn btn-secondary">Retour</a></div><div id="doctor-form-message"></div></form></section>
</main>
  <script src="/app.js"></script>
</body>
</html>
