<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MedPass — Créer / lier un patient</title><link rel="stylesheet" href="/styles.css" /></head>
<body data-page="doctorForm"><div class="app-bg"></div><main class="shell"><section class="phone-frame wide-frame"><header class="topbar"><div><p class="eyebrow">Médecin</p><h1>Créer ou lier un patient</h1></div><button id="logout-btn" class="btn btn-secondary">Déconnexion</button></header><nav id="global-nav" class="app-nav"></nav><section class="section-block"><div class="app-card" style="margin-bottom:14px;"><p class="muted">Si l’e-mail existe déjà, le patient sera automatiquement lié à votre espace. Sinon, un compte patient sera créé avec un mot de passe temporaire.</p></div><form id="doctor-create-patient-form" class="stack"><div class="grid-3"><div class="label-block"><label>Prénom</label><input name="first_name" required /></div><div class="label-block"><label>Nom</label><input name="last_name" required /></div><div class="label-block"><label>Date de naissance</label><input type="date" name="birth_date" /></div></div><div class="grid-3"><div class="label-block"><label>E-mail patient</label><input type="email" name="patient_email" required /></div><div class="label-block"><label>Mot de passe temporaire</label><input type="password" name="patient_password" minlength="8" required /></div><div class="label-block"><label>Téléphone</label><input name="phone_number" /></div></div><div class="grid-2"><div class="label-block"><label>Groupe sanguin</label><input name="blood_type" /></div><div class="label-block"><label>Nom contact urgence</label><input name="emergency_contact_name" /></div></div><div class="grid-2"><div class="label-block"><label>Téléphone urgence</label><input name="emergency_contact_phone" /></div><div class="label-block"><label>Instructions secours</label><textarea name="emergency_instructions"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Allergies</label><textarea name="public_allergies"></textarea></div><div class="label-block"><label>Pathologies d'urgence</label><textarea name="public_conditions"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Médecin traitant</label><input name="doctor_name" /></div><div class="label-block"><label>RPPS</label><input name="doctor_rpps" /></div></div><div class="label-block"><label>Notes initiales</label><textarea name="notes"></textarea></div><div class="form-actions"><button type="submit" class="btn btn-primary">Créer le patient</button><a href="/doctor.html" class="btn btn-secondary">Retour</a></div><div id="doctor-form-message"></div></form></section></section></main><script src="/app.js"></script></body></html>
