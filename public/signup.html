<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MedPass — Inscription</title><link rel="stylesheet" href="/styles.css" /></head>
<body data-page="signup"><div class="app-bg"></div><main class="shell shell-site shell-full"><section class="phone-frame wide-frame site-frame site-frame-full"><header class="topbar topbar-site"><div><p class="eyebrow">Créer un compte</p><h1>Inscription</h1><p class="muted site-subtitle">Commencez avec une adresse e-mail confirmée et un numéro de téléphone.</p></div></header><nav id="global-nav" class="app-nav"></nav><section class="section-block"><form id="signup-form" class="stack"><div class="grid-2"><div class="label-block"><label>Prénom</label><input name="first_name" required /></div><div class="label-block"><label>Nom</label><input name="last_name" required /></div></div><div class="grid-2"><div class="label-block"><label>E-mail</label><input type="email" name="email" required /></div><div class="label-block"><label>Numéro de téléphone</label><input name="phone_number" required /></div></div><div class="grid-2"><div class="label-block"><label>Date de naissance</label><input type="date" name="birth_date" /></div><div class="label-block"><label>Rôle</label><select name="role" id="signup-role"><option value="patient">Patient</option><option value="doctor">Médecin</option></select></div></div><div class="label-block hidden" id="doctor-pin-wrap"><label>PIN médecin (4 chiffres)</label><input name="doctor_pin" maxlength="4" /></div><div class="grid-2"><div class="label-block"><label>Code e-mail</label><input name="verification_code" required /></div><div class="label-block"><label>Mot de passe</label><input type="password" name="password" minlength="8" required /></div></div><div class="form-actions"><button type="button" id="send-code-btn" class="btn btn-secondary">Envoyer le code</button><button type="submit" class="btn btn-primary">Créer le compte</button></div></form><div id="signup-result"></div></section></section></main><script src="/app.js"></script></body></html>
