<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MedPass — Profil</title><link rel="stylesheet" href="/styles.css" /></head>
<body data-page="patientProfile"><div class="app-bg"></div><main class="shell"><section class="phone-frame wide-frame"><header class="topbar"><div><p class="eyebrow">Patient</p><h1 id="pp-name">Mon profil</h1></div><button id="logout-btn" class="btn btn-secondary">Déconnexion</button></header><nav id="global-nav" class="app-nav"></nav><form id="patient-profile-form" class="section-block stack"><div class="section-title-row"><div><p class="section-kicker">Données publiques</p><h3>À compléter par le patient</h3></div></div><div class="grid-2"><div class="label-block"><label>Groupe sanguin *</label><input name="blood_type" required /></div><div class="label-block"><label>Contact urgence *</label><input name="emergency_contact_name" required /></div></div><div class="grid-2"><div class="label-block"><label>Numéro urgence *</label><input name="emergency_contact_phone" required /></div><div class="label-block"><label>Allergies</label><textarea name="public_allergies"></textarea></div></div><div class="grid-2"><div class="label-block"><label>Pathologies urgence</label><textarea name="public_conditions"></textarea></div><div class="label-block"><label>Instructions secours</label><textarea name="emergency_instructions"></textarea></div></div><div class="app-card"><p class="section-kicker">Partie réservée au médecin</p><p id="doctor-locked-state" class="muted"></p></div><div class="form-actions"><button type="submit" class="btn btn-primary">Enregistrer</button><a href="/patient-qr.html" class="btn btn-secondary">Mon QR</a></div><div id="profile-message"></div></form></section></main><script src="/app.js"></script></body></html>
